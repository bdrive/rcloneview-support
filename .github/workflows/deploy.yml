# support 사이트 배포 — 빌드 후 Cloudflare R2 로 동기화.
#
# 흐름: main 머지 → 9로케일 빌드(+postbuild 가 죽은 static 사본 자동 삭제)
#       → rclone sync 로 R2 버킷 업로드 → Worker 가 rcloneview.com/support/* 서빙
# PR 은 빌드 검증만 수행한다 (배포 안 함).
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   R2_ACCESS_KEY_ID      — R2 API 토큰의 Access Key ID
#   R2_SECRET_ACCESS_KEY  — R2 API 토큰의 Secret Access Key
#   R2_ENDPOINT           — https://<ACCOUNT_ID>.r2.cloudflarestorage.com
# 발급 절차: DEPLOYMENT_R2_ko.md 2장 참고.

name: Deploy support to R2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-support
  cancel-in-progress: false # 배포 중단 방지 (반쯤 올라간 상태 금지)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build (9 locales + prune)
        run: npm run build # postbuild 훅이 로케일별 죽은 static 사본을 자동 삭제

      - name: Install rclone
        if: github.event_name == 'push'
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync to R2
        if: github.event_name == 'push'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          rclone sync build/ r2:rcloneview-support \
            --fast-list --checksum --transfers 32 \
            --delete-after \
            --exclude ".DS_Store" \
            --stats-one-line --stats 30s
          echo "동기화 완료: $(rclone size r2:rcloneview-support --json)"
